<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>LIURIU</title>
  </head>
  <body>
    <div id="app" class="app-container">
      
      <!-- MAIN PAGE -->
      <main class="page-main" id="page-main">
        <header class="main-header">
          <div class="header-left">
            <h1 id="app-title">LIURIU</h1>
            <button id="btn-open-months" class="month-selector-btn">Tháng này <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
          </div>
          <div class="header-right">
            <div id="totals-wrapper" class="totals-wrapper">
              <span id="total-income" class="total-text income-text">+ 0 đ</span>
              <span id="total-expense" class="total-text expense-text">- 0 đ</span>
            </div>
            <button id="btn-cancel-select" class="cancel-text hidden">Hủy</button>
          </div>
        </header>

        <section class="feed-section" id="expense-feed">
          <!-- Các thẻ sẽ thả vào đây -->
        </section>

        <!-- Trạng thái trống -->
        <div class="empty-state hidden" id="empty-state">
           <div class="empty-icon-wrapper">
             <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="9" y1="15" x2="15" y2="21"></line><line x1="15" y1="15" x2="9" y2="21"></line></svg>
           </div>
           <p>Không có chi tiêu nào trong tháng này.</p>
        </div>

        <div id="fab-container" class="fab-container">
          <!-- Button + / Thu vào (Màu xanh) -->
          <button id="fab-income" class="fab-btn fab-income">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
          <!-- Button - / Chi ra (Màu đỏ cam) -->
          <button id="fab-expense" class="fab-btn fab-expense">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>

        <button id="fab-delete" class="fab-btn fab-delete hidden">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </main>

      <!-- MODAL CAMERA -->
      <section class="modal camera-modal hidden" id="modal-camera">
        <header class="modal-header">
          <button class="icon-btn" id="btn-close-camera">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
          <span class="modal-title">Chụp ảnh món đồ</span>
          <button class="icon-btn" id="btn-flip-camera">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          </button>
        </header>
        
        <div class="camera-wrapper">
           <video id="camera-video" autoplay playsinline></video>
           <div class="camera-dash-border"></div>
        </div>

        <div class="camera-footer">
          <button id="capture-btn" class="capture-trigger">
             <div class="capture-inner-orange"></div>
          </button>
        </div>
      </section>

      <!-- MODAL CHI TIẾT (Nhập tiền) -->
      <section class="modal detail-modal hidden" id="modal-detail">
        <div class="detail-container">
          <div class="preview-wrapper">
             <img id="preview-image" src="" alt="Captured Image" />
          </div>

          <div class="form-group">
             <label>Giá tiền (VNĐ)</label>
             <input type="text" id="price-input" placeholder="Ví dụ: 50.000" inputmode="numeric" />
          </div>

          <div class="form-group">
             <label>Ghi chú (Không bắt buộc)</label>
             <input type="text" id="note-input" placeholder="Ví dụ: Cà phê sáng" />
          </div>

          <div class="action-row">
            <button id="btn-cancel-detail" class="btn btn-dark">Hủy</button>
            <button id="btn-save-detail" class="btn btn-blue">Lưu chi tiêu</button>
          </div>
        </div>
      </section>

      <!-- MODAL CHỌN THÁNG -->
      <section class="modal month-modal hidden" id="modal-months">
        <header class="modal-header">
           <button class="icon-btn" id="btn-close-months">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
           </button>
           <div class="year-selector">
             <button id="prev-year" class="year-btn">&lt;</button>
             <span id="display-year">2026</span>
             <button id="next-year" class="year-btn">&gt;</button>
           </div>
           <div style="width: 44px;"></div> <!-- spacer -->
        </header>
        <div class="month-grid" id="month-grid">
           <!-- Render 12 tháng bằng Javascript -->
        </div>
      </section>
    
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
