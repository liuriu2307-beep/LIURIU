name: Build iOS IPA
on:
  push:
    branches: [ "master", "main" ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cài đặt thư viện
        run: npm install
      - name: Gom web thành PWA
        run: npm run build
      - name: Đồng bộ iOS Capacitor
        run: |
          npm install -g @capacitor/cli
          npx cap sync ios
      - name: Biên dịch Xcode
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Đóng gói thành file IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload/
      - name: Đẩy bản tải về
        uses: actions/upload-artifact@v4
        with:
          name: AppChiTieu_Unsigned
          path: App.ipa
          retention-days: 1
